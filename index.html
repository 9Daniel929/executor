<!DOCTYPE html>
<html>
<head>
  <title>Safari Code Executor</title>
  <!-- Load the Luau WebAssembly library -->
  <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>
  <h2>Select Language</h2>
  <select id="lang">
    <option value="html">HTML/CSS/JS</option>
    <option value="luau">Luau</option>
  </select>

  <textarea id="editor" placeholder="Type code here..." style="width:100%; height:200px;"></textarea>
  <button onclick="run()">Execute</button>

  <h3>Output</h3>
  <div id="output-box">
    <iframe id="preview" style="display:none; width:100%; border:1px solid #ccc;"></iframe>
    <pre id="console" style="background:#eee; padding:10px;"></pre>
  </div>

  <script>
    async function run() {
      const code = document.getElementById('editor').value;
      const lang = document.getElementById('lang').value;
      const preview = document.getElementById('preview');
      const consoleOut = document.getElementById('console');

      if (lang === 'html') {
        preview.style.display = 'block';
        consoleOut.innerText = '';
        preview.srcdoc = code; // Directly renders web code
      } 
      else if (lang === 'luau') {
        preview.style.display = 'none';
        try {
          // Using a WASM-based Luau runtime
          const runtime = new Luau.Runtime(); 
          const result = runtime.exec(code);
          consoleOut.innerText = result || "Script finished (no output)";
        } catch (err) {
          consoleOut.innerText = "Error: " + err;
        }
      }
    }
  </script>
</body>
</html>
